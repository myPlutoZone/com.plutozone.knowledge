<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title></title>
	<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey="></script>
	<script>
		// 상용 또는 로컬 테스트용 appKey 발급(카카오 개발자 센터 > 앱 > 앱 설정 > 앱 > 플랫폼 키 > JavaScript 키 = appKey) 필요
		var map;
		
		window.onload = function () {
		
			var container = document.getElementById("map");
			var options = {
				center: new kakao.maps.LatLng(33.450701, 126.570667),
				level: 3
			};
			
			map = new kakao.maps.Map(container, options);
			
			currentLocation();
		}
		
		// [출처] https://itwithruilan.tistory.com/105
		function currentLocation() {
			// HTML5의 geolocation으로 사용할 수 있는지 확인
			if (navigator.geolocation) {
				
				// GeoLocation을 이용해서 접속 위치 확인
				navigator.geolocation.getCurrentPosition(function(position) {
					
					var lat = position.coords.latitude,		// 위도
						lon = position.coords.longitude;	// 경도
						
					var locPosition = new kakao.maps.LatLng(lat, lon);							// 마커가 표시될 위치를 geolocation으로 얻어온 좌표로 생성
					var message = "<div style='padding: 5px; font-size: 10pt; color: red;'>현위치</div>";	// 인포윈도우에 표시될 내용
					
					// 현재 접속 위치로 이동
					map.setCenter(locPosition);
					
					// 1. 현재 위치의 마커와 인포 윈도우를 표시
					displayMarker("", locPosition, message);
					
					// 2. 한전아트센터(스포츠클럽)의 마커와 인포 인포 윈도우를 표시
					// 좌표 찾기: https://apis.map.kakao.com/web/sample/addMapClickEventWithMarker/
					/*
					lat = 37.48564239975204;
					lon = 127.02852139658732;
					locPosition = new kakao.maps.LatLng(lat, lon)
					message = "<div style='padding: 5px; font-size: 10pt;'>한전아트센터(스포츠클럽)</div>";
					displayMarker("artCenter", locPosition, message);
					*/
					
					// *********************
					// 모블s
					// *********************
					lat = 36.81306968750602;
					lon = 127.14859498136673;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 하나로마트
					message = "<div style='padding: 5px; font-size: 10pt;'>[간식] 과자 등</div>";
					displayMarker("", locPosition, message);
					
					lat = 36.81033479676149;
					lon = 127.14861210927822;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 역전마트
					message = "<div style='padding: 5px; font-size: 10pt;'>[간식] 사탕류만</div>";
					displayMarker("", locPosition, message);
					
					lat = 36.81016685176857;
					lon = 127.14960077356014;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 오복갈비
					message = "<div style='padding: 5px; font-size: 10pt;'>[추천] 갈비탕(12,000원)</div>";
					displayMarker("", locPosition, message);
					
					lat = 36.807333650506614;
					lon = 127.14716070161761;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 달식당
					message = "<div style='padding: 5px; font-size: 10pt;'>[추천] 달돈가스(11,000원)(</div>";
					displayMarker("", locPosition, message);
					
					lat = 36.80721419119211;
					lon = 127.147210901103261;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 봉평옹심이메밀칼국수
					message = "<div style='padding: 5px; font-size: 10pt;'>[추천] 막국수(10,000원)</div>";
					displayMarker("", locPosition, message);
					 
					lat = 36.81027920107195;
					lon = 127.14983072927724;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 남도밥상
					message = "<div style='padding: 5px; font-size: 10pt;'>[추천] 돌솔정식(10,000원)</div>";
					displayMarker("", locPosition, message);
					
					lat = 36.8104749413111;
					lon = 127.15003002994021;
					locPosition = new kakao.maps.LatLng(lat, lon)
					// 홍윤선가정식백반
					message = "<div style='padding: 5px; font-size: 10pt;'>[주의] 2인 이상</div>";
					displayMarker("", locPosition, message);
				});
			}
			// HTML5의 GeoLocation을 사용할 수 없을 때 마커 표시 위치와 인포윈도우 내용을 설정
			else {
				
				var locPosition = new kakao.maps.LatLng(37.4812845080678, 126.952713197762),
				message = '현재 위치를 알 수 없어 기본 위치로 이동합니다.'
				
				currentLatLon['lat'] = 33.450701
				currentLatLon['lon'] = 126.570667
				
				// 마커와 인포윈도우를 표시
				// displayMarker("", locPosition, message);
			}
			return true
		}
		
		// [출처] https://itwithruilan.tistory.com/105
		function displayMarker(image, locPosition, message) {
		
			if (image == "artCenter") {
				// var imageSize	= new kakao.maps.Size(146, 22);
				// var markerImage	= new kakao.maps.MarkerImage("/image/sportCenter.png", imageSize);
				var imageSize	= new kakao.maps.Size(20, 20);
				var markerImage	= new kakao.maps.MarkerImage("/marker.png", imageSize);
			}
			else {
				var imageSize	= new kakao.maps.Size(10, 10);
				var markerImage	= new kakao.maps.MarkerImage("/marker.png", imageSize);
			}
			
			// 마커 생성
			var marker = new kakao.maps.Marker({
				map: map, 
				position: locPosition, 
				image : markerImage, 
			});
			
			// 인포 윈도우에 표시할 내용
			var iwContent = message, iwRemoveable = true;
			
			// 인포 윈도우를 생성
			var infowindow = new kakao.maps.InfoWindow({
				content : iwContent,
				removable : iwRemoveable
			});
			
			// 인포 윈도우를 마커 위에 표시
			infowindow.open(map, marker);
			
			// 지도 중심 좌표를 접속 위치로 변경
			map.setCenter(locPosition);
		}
		// 지도 확대, 축소 컨트롤에서 확대 버튼을 누르면 호출되어 지도를 확대하는 함수입니다
		function zoomIn() {
			map.setLevel(map.getLevel() - 1);
		}

		// 지도 확대, 축소 컨트롤에서 축소 버튼을 누르면 호출되어 지도를 확대하는 함수입니다
		function zoomOut() {
			map.setLevel(map.getLevel() + 1);
		}
	</script>
	<style>
		html, body {width:100%;height:100%;margin:0;padding:0;} 
		.map_wrap {position:relative;overflow:hidden;width:100%;height:100%;}
		.radius_border{border:1px solid #919191;border-radius:5px;}     
		.custom_zoomcontrol {position:absolute;top:50px;right:10px;width:36px;height:80px;overflow:hidden;z-index:1;background-color:#f5f5f5;}
		.custom_zoomcontrol span {display:block;width:36px;height:40px;text-align:center;cursor:pointer;}
		.custom_zoomcontrol span img {width:15px;height:15px;padding:12px 0;border:none;}
		.custom_zoomcontrol span:first-child{border-bottom:1px solid #bfbfbf;}
	</style>
</head>
<body>
<div class="map_wrap">
	<div id="map" style="width:100%;height:100%;position:relative;overflow:hidden;"></div> 
	<div class="custom_zoomcontrol radius_border"> 
		<span onclick="zoomIn()"><img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/ico_plus.png" alt="확대"></span>  
		<span onclick="zoomOut()"><img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/ico_minus.png" alt="축소"></span>
	</div>
</div>
</body>
</html>
